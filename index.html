<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tapri Coming Soon</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f3f4f6;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    .timer {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #4b5563;
    }
    .counter {
      font-size: 1.2rem;
      color: #10b981;
      margin-bottom: 20px;
    }
    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      background: #3b82f6;
      border-radius: 5px;
    }
    .description {
      margin-top: 30px;
      font-size: 1.1rem;
      color: #374151;
    }
  </style>
</head>
<body onload="startTimer(); incrementVisits();">

  <div class="container">
    <h1>🚀 Tapri Launching Soon</h1>
    
    <div class="timer" id="countdown">Loading countdown...</div>
    
    <div class="counter">👥 Total Visitors: <span id="visitorCount">0</span></div>
    
    <div class="buttons">
      <a href="https://example.com/leader-form" target="_blank">Sign up as Leader</a>
      <a href="https://example.com/creator-form" target="_blank">Sign up as Creator</a>
    </div>

    <div class="description">
      <p><strong>What is Tapri?</strong></p>
      <p>Tapri is not just a surprise—it's a revolution for teenage entrepreneurs.  
      A place where ideas brew like chai and futures begin to boil. Stay tuned!</p>
    </div>
  </div>

  <script>
    // Countdown timer
    function startTimer() {
      const launchDate = new Date("2025-06-08T00:00:00").getTime(); // Set your date
      const x = setInterval(function () {
        const now = new Date().getTime();
        const distance = launchDate - now;

        if (distance < 0) {
          clearInterval(x);
          document.getElementById("countdown").innerHTML = "🚀 Tapri is live!";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
          `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }, 1000);
    }

    // Visitor counter (localStorage version)
    function incrementVisits() {
      if (!localStorage.getItem('tapriVisitCount')) {
        localStorage.setItem('tapriVisitCount', 1);
      } else {
        let count = parseInt(localStorage.getItem('tapriVisitCount'));
        localStorage.setItem('tapriVisitCount', count + 1);
      }
      document.getElementById("visitorCount").textContent =
        localStorage.getItem('tapriVisitCount');
    }
  </script>

</body>
</html>
